# Optional LibreTranslate service for the "Draft translation" feature.
#
# This is NOT started by `npm run dev` — translation is opt-in. Bring it up
# with `npm run dev:translate` (or `docker compose up -d libretranslate`), then
# add `LIBRETRANSLATE_URL=http://localhost:5000` to your .env and restart the
# Express server so it picks the URL up.
#
# First boot downloads the language models for the locales below (a few hundred
# MB) into a named volume, so subsequent starts are fast. CV text only ever
# travels browser → this app's server → this container; nothing leaves the host.
services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: resumestudio-libretranslate
    ports:
      - "5000:5000"
    environment:
      # Which Argos language packages to install. Each is a few hundred MB, so
      # this is deliberately a subset rather than every locale the app offers.
      #
      # The desktop app SETS this env var from Settings → Translation languages
      # (server/settings.ts → applyToEnv), so the container it starts installs
      # exactly what the user picked. The default below is the historic set
      # (en + Norwegian Bokmål, Swedish, Danish) and applies when you run
      # `docker compose up` by hand. `en` is always included by the app: Argos
      # pivots most pairs through English.
      LT_LOAD_ONLY: "${LT_LOAD_ONLY:-en,nb,sv,da}"
      # No public-facing web UI is needed — the app talks to the API directly.
      LT_DISABLE_WEB_UI: "true"
    # Persist downloaded Argos models so they aren't re-fetched on every restart.
    # Mount the user's whole ~/.local (not the deeper argos-translate dir): a
    # fresh named volume inherits ownership from the image's existing directory,
    # so the non-root libretranslate user can still write model packages. The
    # deeper path is created root-owned and crashes startup with EACCES.
    volumes:
      - libretranslate_models:/home/libretranslate/.local
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/languages').getcode()==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # Optional local LLM for the "Summarize" feature (short descriptions).
  # NOT started by `npm run dev` — opt-in. The desktop Settings screen can
  # manage this container (start/stop + pull the chosen model), or bring it up
  # manually with `docker compose up -d ollama`, then point Summarize at
  # http://localhost:11434. The first model pull downloads several GB into a
  # named volume; CV text only ever travels browser → this app's server → this
  # container, so nothing leaves the host.
  ollama:
    image: ollama/ollama:latest
    container_name: resumestudio-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  libretranslate_models:
  ollama_models:
